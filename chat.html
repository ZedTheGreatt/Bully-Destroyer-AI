<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Bully Destroyer AI - Anti-Bullying AI Chatbot</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

  <!-- Loading Screen -->
  <div id="loadingScreen">
    <div class="loader"></div>
    <p>Preparing your safe space...</p>
  </div>

  <!-- Main App Container -->
  <div id="chat-container">
    
    <!-- Header -->
    <header id="header">
      <a href="index.html" class="back-btn" title="Go back to Home">
        <i class="fas fa-chevron-left"></i>
      </a>
      <div class="header-info">
        <h2>Bully Destroyer <b class="ai-highlight">AI</b></h2>
        <span class="status"><span class="dot"></span> Online - Safe & Anonymous</span>
      </div>
      <div class="header-icons">
        <button id="darkModeToggle" class="icon-btn" title="Toggle Dark Mode">
          <i class="fas fa-moon"></i>
        </button>
        <div class="header-icon">
          <i class="fas fa-shield-alt"></i>
        </div>
      </div>
    </header>

    <!-- Chat Messages Area -->
    <main id="messages">
      <!-- JavaScript will inject messages here -->
    </main>

    <!-- Quick Actions (Scrollable) -->
    <div class="quick-actions">
      <button onclick="sendAI('I need some advice, I am being bullied.')">
        <i class="fas fa-hands-helping"></i> Need Advice
      </button>
      <button onclick="sendAI('How do I report a bullying incident to my school anonymously?')">
        <i class="fas fa-flag"></i> How to Report
      </button>
      <button onclick="showContactModal()">
        <i class="fas fa-phone"></i> School Contact
      </button>
      
      <!-- Custom Styled Select Dropdown -->
      <div class="select-wrapper">
        <select id="bullyingTypes" onchange="handleBullyingType()">
          <option value="" disabled selected>Learn about...</option>
          <option value="physical">Physical Bullying</option>
          <option value="verbal">Verbal Bullying</option>
          <option value="cyber">Cyberbullying</option>
          <option value="social">Social Bullying</option>
        </select>
        <i class="fas fa-chevron-down dropdown-icon"></i>
      </div>
    </div>

    <!-- Input Area -->
    <footer id="inputContainer">
      <div class="input-wrapper">
        <input type="text" id="userInput" placeholder="Type a message..." autocomplete="off" onkeypress="handleKeyPress(event)">
        <button id="sendBtn" onclick="handleSend()">
          <i class="fas fa-paper-plane"></i>
        </button>
      </div>
    </footer>

  </div>

  <!-- Contact Modal -->
  <div id="contactModal" class="modal">
    <div class="modal-content">
      <span class="close-btn" onclick="closeContactModal()">&times;</span>
      <h2>ICP Meycauayan Contact Info</h2>
      <div class="contact-info">
        <div class="contact-item">
          <i class="fas fa-map-marker-alt"></i>
          <div>
            <strong>Address:</strong><br>
            <a href="https://maps.app.goo.gl/epKB84UmzN6U4JY19" target="_blank">1st PMS Building, McArthur Highway, Brgy. Saluysoy</a>
          </div>
        </div>
        <div class="contact-item">
          <i class="fas fa-envelope"></i>
          <div>
            <strong>Email:</strong><br>
            <a href="mailto:icpolytechnic@gmail.com">icpolytechnic@gmail.com</a>
          </div>
        </div>
        <div class="contact-item">
          <i class="fas fa-phone"></i>
          <div>
            <strong>Phone:</strong><br>
            <a href="tel:+639690672868">(0969) 0672868</a>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Ensure you link to the same JS file -->
  <script src="darkmode.js"></script>
  <script src="script.js"></script>
</body>
</html>
